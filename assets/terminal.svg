<svg width="960" height="320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 霓虹发光滤镜 -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 网格背景 -->
    <pattern id="gridBg" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1e1b4b" stroke-width="1" opacity="0.85"/>
    </pattern>
    <!-- 扫描线 -->
    <pattern id="scanline" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="2" fill="#000000" opacity="0.35"/>
    </pattern>
  </defs>

  <!-- 底层背景 -->
  <rect width="960" height="320" rx="16" fill="#030712"/>
  <rect width="960" height="320" rx="16" fill="url(#gridBg)" opacity="0.45"/>
  <rect width="960" height="320" rx="16" fill="url(#scanline)" opacity="0.25"/>

  <!-- 霓虹双层边框 -->
  <rect x="1" y="1" width="958" height="318" rx="15" stroke="#c026d3" stroke-width="2" fill="none" opacity="0.8"/>
  <rect x="3" y="3" width="954" height="314" rx="14" stroke="#06b6d4" stroke-width="1" fill="none" opacity="0.6"/>

  <!-- 顶部窗口栏 -->
  <rect x="12" y="12" width="936" height="42" rx="10" fill="#0f172a" opacity="0.95"/>
  <circle cx="26" cy="33" r="6" fill="#ef4444" opacity="0.9"/>
  <circle cx="46" cy="33" r="6" fill="#f59e0b" opacity="0.9"/>
  <circle cx="66" cy="33" r="6" fill="#10b981" opacity="0.9"/>
  <text x="96" y="38" fill="#94a3b8" font-size="14" font-family="Consolas,Menlo,monospace">cyber@dev ~ $ </text>

  <!-- 永久闪烁光标 -->
  <rect x="18" y="64" width="10" height="20" fill="#06b6d4" filter="url(#neonGlow)">
    <animate attributeName="opacity" values="1;0;1" dur="0.65s" repeatCount="indefinite"/>
  </rect>

  <g font-family="Consolas,Menlo,monospace" font-size="16" fill="#06b6d4" filter="url(#neonGlow)">
    <!-- 第一行逐字打出，打出后永久保留 -->
    <text x="38" y="82">
      <tspan opacity="0"><animate to="1" begin="0.15s" fill="freeze"/>e</tspan>
      <tspan opacity="0"><animate to="1" begin="0.28s" fill="freeze"/>c</tspan>
      <tspan opacity="0"><animate to="1" begin="0.41s" fill="freeze"/>h</tspan>
      <tspan opacity="0"><animate to="1" begin="0.54s" fill="freeze"/>o</tspan>
      <tspan> "除了 bug，万事皆可解"</tspan>
    </text>

    <!-- 后三行延时出现，出现后永不消失 -->
    <text x="38" y="118">
      <animate from="0" to="1" begin="4s" dur="0.05s" fill="freeze"/>
      echo "头发常在，代码不改"
    </text>

    <text x="38" y="154">
      <animate from="0" to="1" begin="7s" dur="0.05s" fill="freeze"/>
      echo "需求千千万，逻辑第一条"
    </text>

    <text x="38" y="190">
      <animate from="0" to="1" begin="10s" dur="0.05s" fill="freeze"/>
      echo "人生无缓存，凡事皆重构"
    </text>
  </g>
</svg>
