<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <title>裤佬音乐网 - 初音水蓝主题</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              500: '#67e8f9',
              600: '#22d3ee',
              700: '#06b6d4',
            }
          }
        }
      }
    }
  </script>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    
    body {
      font-family: "Microsoft YaHei", "Hiragino Sans GB", "Noto Sans JP", sans-serif !important;
      -webkit-tap-highlight-color: transparent;
      padding-bottom: env(safe-area-inset-bottom);
      min-height: 100vh;
    }
    @keyframes lyricFadeIn { 
      0% { opacity: 0; transform: translateY(4px); } 
      100% { opacity: 1; transform: translateY(0); } 
    }
    .animate-lyric { animation: lyricFadeIn 0.25s ease-out forwards; }
    
    * { transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease, box-shadow 0.25s ease; }

    #musicList > div {
      transition: transform 0.2s ease;
    }
    #musicList > div:hover {
      transform: translateY(-2px);
    }
    .lyric-line:hover {
      text-shadow: 0 0 8px currentColor;
    }

    /* 浅色 冰白水蓝 */
    html.light { background-color: #f0fdff; }
    html.light body { background-color: #f0fdff; color: #0f3640; }
    html.light .bg-slate-950 { background-color: #f0fdff; }
    html.light .bg-slate-900 { background-color: #ffffff; }
    html.light .bg-slate-900\/50 { background-color: rgba(240,253,255,0.8); }
    html.light .bg-slate-900\/30 { background-color: rgba(232,251,255,0.5); }
    html.light .bg-slate-900\/90 { background-color: rgba(248,254,255,0.95); }
    html.light .bg-slate-900\/95 { background-color: rgba(248,254,255,0.97); }
    html.light .border-slate-800 { border-color: #d6f8fb; }
    html.light .border-slate-800\/80 { border-color: #d6f8fb; }
    html.light .border-slate-800\/60 { border-color: #d6f8fb; }
    html.light .border-slate-800\/50 { border-color: #d6f8fb; }
    html.light .border-slate-800\/40 { border-color: #d6f8fb; }
    html.light .border-slate-800\/30 { border-color: #d6f8fb; }
    html.light .border-slate-700 { border-color: #b2ecf3; }
    html.light .text-slate-100 { color: #0f3640; }
    html.light .text-slate-200 { color: #144550; }
    html.light .text-slate-300 { color: #1b5868; }
    html.light .text-slate-400 { color: #388899; }
    html.light .text-slate-500 { color: #86c7d4; }
    html.light .text-slate-600 { color: #2d7485; }
    html.light .bg-slate-800 { background-color: #d6f8fb; }
    html.light .hover\:bg-slate-700:hover { background-color: #b2ecf3; }
    html.light .hover\:bg-slate-800\/40:hover { background-color: rgba(214,248,251,0.7); }
    html.light .divide-slate-800\/30 > * + * { border-color: #d6f8fb; }
    html.light .divide-slate-800\/40 > * + * { border-color: #d6f8fb; }
    html.light .bg-slate-950\/40 { background-color: rgba(240,253,255,0.6); }
    html.light .bg-brand-600 { background-color: #22d3ee; }
    html.light .bg-brand-600:hover { background-color: #06b6d4; }
    html.light #miniLyricBar { background-color: rgba(240,253,255,0.9); }
    html.light select.bg-slate-800 { background-color: #d6f8fb; color: #144550; }
    html.light select.bg-slate-800 option { background-color: #ffffff; color: #0f3640; }
    html.light .bg-slate-800.border-slate-700 { border-color: #b2ecf3; }
    html.light #lyricsContainer .text-slate-500 { color: #86c7d4; }
    html.light #lyricsContainer .text-slate-600 { color: #388899; }
    html.light #lyricsContainer .text-brand-400 { color: #22d3ee; }
    html.light .bg-slate-800.text-slate-300 { color: #1b5868; }
    html.light .bg-slate-800.text-slate-600 { color: #86c7d4; }
    html.light .hover\:bg-slate-700.text-slate-300:hover { color: #0f3640; }
    html.light .bg-slate-800\/40 { background-color: rgba(214,248,251,0.4); }

    /* 深色 深海初音 */
    html.dark { background-color: #091a20; }
    html.dark body { background-color: #091a20; color: #c6f2f9; }
    html.dark .bg-slate-950 { background-color: #061418; }
    html.dark .bg-slate-900 { background-color: #0f2b33; }
    html.dark .bg-slate-800 { background-color: #18404b; }
    html.dark .border-slate-800 { border-color: #1d4c58; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans select-none antialiased min-h-screen">
  <!-- 导航栏 -->
  <header class="sticky top-0 z-40 bg-slate-900/90 backdrop-blur-md border-b border-slate-800/80 px-3 py-2 flex items-center justify-between">
    <div class="w-[72px]"></div>
    <div class="flex flex-col items-center">
      <div class="relative">
        <div class="absolute -inset-1 bg-gradient-to-r from-cyan-300 to-brand-500 rounded-full blur-md opacity-70"></div>
        <img src="https://dogpan.com/f/r0EAi2/touxiang.gif" class="relative w-11 h-11 rounded-full border-2 border-brand-500 object-cover" alt="Avatar">
      </div>
      <h1 class="text-xl md:text-2xl font-black mt-0.5 tracking-wider bg-gradient-to-r from-brand-500 to-cyan-300 bg-clip-text text-transparent">裤佬音乐网</h1>
    </div>
    <div class="flex items-center space-x-0.5 w-[72px] justify-end">
      <button id="themeToggle" class="p-2 text-slate-400 hover:text-white rounded-full hover:bg-slate-800 transition cursor-pointer">
        <svg id="themeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path id="sunPath" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
          <path id="moonPath" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" class="hidden" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
      </button>
      <button id="settingsBtn" class="p-2 text-slate-400 hover:text-white rounded-full hover:bg-slate-800 transition cursor-pointer">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
      </button>
    </div>
  </header>
  <!-- 核心内容 -->
  <main class="max-w-7xl mx-auto w-full px-3 py-3 flex flex-col gap-3 pb-6">
    <!-- 搜索栏 -->
    <div class="flex space-x-2 shrink-0">
      <input id="searchInput" type="text" placeholder="搜歌曲、歌手、专辑..." class="flex-1 bg-slate-900 border border-slate-800 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:border-brand-500 text-slate-200 transition placeholder:text-slate-500">
      <button id="searchBtn" class="bg-brand-600 hover:bg-brand-700 active:scale-95 text-white font-medium text-sm px-5 py-2.5 rounded-xl transition shrink-0">搜索</button>
    </div>
    <!-- 歌曲列表 -->
    <div class="bg-slate-900/50 border border-slate-800/80 rounded-xl flex-1 flex flex-col overflow-hidden">
      <div class="px-3.5 py-2 border-b border-slate-800/60 flex justify-between items-center shrink-0">
        <span class="font-bold text-xs text-slate-300">歌曲列表</span>
        <span id="pageIndicator" class="text-[10px] text-slate-500">第 1 页</span>
      </div>
      <div id="musicList" class="overflow-y-auto no-scrollbar divide-y divide-slate-800/30 max-h-[40vh] md:max-h-[50vh]">
        <div class="text-center text-slate-500 py-12 text-sm">输入歌曲名开始搜索吧 ✨</div>
      </div>
      <div id="pagination" class="hidden px-3 py-2 border-t border-slate-800/40 flex justify-between shrink-0">
        <button id="prevPageBtn" class="text-[11px] px-2.5 py-1 bg-slate-800 rounded-lg hover:bg-slate-700 transition text-slate-300">上一页</button>
        <button id="nextPageBtn" class="text-[11px] px-2.5 py-1 bg-slate-800 rounded-lg hover:bg-slate-700 transition text-slate-300">下一页</button>
      </div>
    </div>
    <!-- 播放器 -->
    <div class="bg-slate-900/95 border border-slate-800/80 rounded-xl p-3 flex flex-col gap-2">
      <!-- 迷你歌词条 -->
      <div id="miniLyricBar" class="w-full text-center py-1 text-xs font-semibold text-brand-400 min-h-[24px] flex items-center justify-center bg-slate-950/40 rounded-lg border border-slate-800/30">
        <span id="miniLyricText" class="truncate px-4">🎵 裤佬音乐，听我想听</span>
      </div>
      <!-- 播放器主体 -->
      <div class="flex flex-col md:flex-row items-center justify-between gap-2">
        <!-- 歌曲信息 -->
        <div class="flex items-center space-x-2.5 w-full md:w-1/3">
          <img id="playerCover" src="" class="w-10 h-10 rounded-lg object-cover bg-brand-600 border border-slate-700 shrink-0">
          <div class="min-w-0 flex-1">
            <div id="playerTitle" class="font-bold text-xs text-slate-100 truncate">未在播放</div>
            <div id="playerArtist" class="text-[10px] text-slate-400 truncate">期待你的选择</div>
          </div>
        </div>
        <!-- 播放控制 -->
        <div class="flex flex-col items-center w-full md:w-2/5 space-y-1">
          <div class="flex items-center space-x-5">
            <button id="prevBtn" class="text-slate-400 hover:text-white transition active:scale-90">
              <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                <path d="M11.354 5.646a.5.5 0 0 0-.708 0l-7 7a.5.5 0 0 0 0 .708l7 7a.5.5 0 0 0 .708-.708L4.707 13H20a.5.5 0 0 0 0-1H4.707l6.647-6.646a.5.5 0 0 0 0-.708z" />
              </svg>
            </button>
            <button id="playBtn" class="bg-brand-600 hover:bg-brand-700 text-white p-2.5 rounded-full transition active:scale-95 shadow-lg shadow-brand-500/20">
              <svg id="playIcon" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" /></svg>
            </button>
            <button id="nextBtn" class="text-slate-400 hover:text-white transition active:scale-90">
              <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12.646 5.646a.5.5 0 0 1 .708 0l7 7a.5.5 0 0 1 0 .708l-7 7a.5.5 0 0 1-.708-.708L19.293 13H4a.5.5 0 0 1 0-1h15.293l-6.647-6.646a.5.5 0 0 1 0-.708z" />
              </svg>
            </button>
          </div>
          <div class="flex items-center space-x-2 w-full text-[10px] text-slate-400">
            <span id="currentTime">00:00</span>
            <div id="progressContainer" class="flex-1 h-1 bg-slate-800 rounded-full cursor-pointer relative group">
              <div id="progressBar" class="h-full bg-brand-500 rounded-full w-0 transition-all duration-100"></div>
            </div>
            <span id="durationTime">00:00</span>
          </div>
        </div>
        <!-- 音质切换 + 下载 -->
        <div class="flex items-center justify-between md:justify-end gap-2 w-full md:w-1/3">
          <select id="qualitySelect" class="bg-slate-800 border border-slate-700 text-[11px] text-slate-300 rounded-lg px-1.5 py-1 outline-none focus:border-brand-500">
            <option value="128k">标准</option>
            <option value="320k">高品质</option>
            <option value="flac">无损</option>
          </select>
          <button id="downloadSongBtn" class="bg-slate-800 hover:bg-slate-700 active:scale-95 text-[11px] text-slate-300 border border-slate-700 rounded-lg px-2.5 py-1 flex items-center space-x-1 transition">
            <svg class="w-3 h-3 text-brand-400" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" /></svg>
            <span>歌曲</span>
          </button>
        </div>
      </div>
    </div>
    <!-- 歌词面板 -->
    <div class="bg-slate-900/30 border border-slate-800/50 rounded-xl overflow-hidden">
      <div class="px-3.5 py-2 border-b border-slate-800/80 flex justify-between items-center bg-slate-900/50">
        <span class="font-bold text-xs text-slate-300">📝 歌词</span>
        <button id="downloadLrcBtn" class="hidden text-[10px] text-brand-400 hover:text-brand-300 flex items-center space-x-1 bg-brand-500/10 hover:bg-brand-500/20 px-2 py-0.5 rounded transition">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" /></svg>
          <span>LRC</span>
        </button>
      </div>
      <div id="lyricsContainer" class="relative overflow-y-auto no-scrollbar py-4 px-4 space-y-1 scroll-smooth max-h-[300px] md:max-h-[400px]">
        <div class="text-center text-slate-500 py-4 text-xs">暂无歌词</div>
      </div>
    </div>
  </main>
  <!-- 设置弹窗 -->
  <div id="settingsModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-slate-900 border border-slate-800 rounded-2xl max-w-lg w-full p-5 space-y-4">
      <div class="flex justify-between items-center">
        <h3 class="text-base font-bold text-slate-100">跨域代理配置</h3>
        <button id="closeSettingsBtn" class="text-slate-400 hover:text-white">✕</button>
      </div>
      <div>
        <label class="block text-xs text-slate-400 mb-1">CORS 代理基础 URL：</label>
        <input id="proxyInput" type="text" placeholder="https://seep.eu.org/" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-1.5 text-xs text-slate-200 outline-none focus:border-brand-500">
      </div>
      <div class="flex justify-end pt-1">
        <button id="saveProxyBtn" class="bg-brand-600 hover:bg-brand-700 text-white text-xs px-3.5 py-1.5 rounded-lg font-medium transition">保存并刷新</button>
      </div>
    </div>
  </div>
  <audio id="audioPlayer" class="hidden">
  <script>
    // ============================================================
    // 核心功能：歌词、搜索、播放（JS完全原版未改动）
    // ============================================================
    function decodeHTML(html) {
      if (!html) return '';
      const txt = document.createElement("textarea");
      txt.innerHTML = html;
      return txt.value;
    }
    function formatTime(seconds) {
      if (isNaN(seconds)) return '00:0';
      const m = Math.floor(seconds / 60).toString().padStart(2, '0');
      const s = Math.floor(seconds % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }
    function artworkShort2Long(albumpicShort) {
      if (!albumpicShort) return undefined;
      const idx = albumpicShort.indexOf("/");
      return idx !== -1 ? `https://img4.kuwo.cn/star/albumcover/1080${albumpicShort.slice(idx)}` : undefined;
    }
    function getDefaultCover() {
      const canvas = document.createElement('canvas');
      canvas.width = 100;
      canvas.height = 100;
      const ctx = canvas.getContext('2d');
      const grad = ctx.createLinearGradient(0, 0, 100, 100);
      grad.addColorStop(0, '#22d3ee');
      grad.addColorStop(1, '#06b6d4');
      ctx.fillStyle = grad;
      ctx.beginPath();
      if (ctx.roundRect) {
        ctx.roundRect(0, 0, 100, 100, 12);
      } else {
        ctx.rect(0, 100);
      }
      ctx.fill();
      ctx.fillStyle = 'white';
      ctx.font = '48px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🎵', 50, 52);
      return canvas.toDataURL('image/png');
    }
    const DEFAULT_COVER = getDefaultCover();
    // 默认代理
    function getProxyUrl(url) {
      const proxyBase = localStorage.getItem('music_cors_proxy') || 'https://fd.apao.kdns.fr/';
      const cleanProxy = proxyBase.endsWith('/') ? proxyBase : proxyBase + '/';
      return `${cleanProxy}${url}`;
    }
    // ========== DOM ==========
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const musicList = document.getElementById('musicList');
    const pageIndicator = document.getElementById('pageIndicator');
    const pagination = document.getElementById('pagination');
    const prevPageBtn = document.getElementById('prevPageBtn');
    const nextPageBtn = document.getElementById('nextPageBtn');
    const audioPlayer = document.getElementById('audioPlayer');
    const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const currentTimeEl = document.getElementById('currentTime');
    const durationTimeEl = document.getElementById('durationTime');
    const playerCover = document.getElementById('playerCover');
    const playerTitle = document.getElementById('playerTitle');
    const playerArtist = document.getElementById('playerArtist');
    const qualitySelect = document.getElementById('qualitySelect');
    const lyricsContainer = document.getElementById('lyricsContainer');
    const miniLyricText = document.getElementById('miniLyricText');
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsModal = document.getElementById('settingsModal');
    const closeSettingsBtn = document.getElementById('closeSettingsBtn');
    const proxyInput = document.getElementById('proxyInput');
    const saveProxyBtn = document.getElementById('saveProxyBtn');
    const downloadSongBtn = document.getElementById('downloadSongBtn');
    const downloadLrcBtn = document.getElementById('downloadLrcBtn');
    const themeToggle = document.getElementById('themeToggle');
    const sunPath = document.getElementById('sunPath');
    const moonPath = document.getElementById('moonPath');
    // ========== 状态 ==========
    let currentQuery = '';
    let currentPage = 1;
    let playlist = [];
    let currentIndex = -1;
    let lyrics = [];
    let lastActiveIdx = -1;
    // ========== 主题切换 ==========
    function setTheme(isDark) {
      const html = document.documentElement;
      if (isDark) {
        html.classList.add('dark');
        html.classList.remove('light');
        sunPath.classList.remove('hidden');
        moonPath.classList.add('hidden');
      } else {
        html.classList.remove('dark');
        html.classList.add('light');
        sunPath.classList.add('hidden');
        moonPath.classList.remove('hidden');
      }
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }
    function toggleTheme() {
      const isDark = document.documentElement.classList.contains('dark');
      setTheme(!isDark);
    }
    themeToggle.onclick = toggleTheme;
    function initTheme() {
      const saved = localStorage.getItem('theme');
      setTheme(saved !== 'light');
    }
    // ========== API ==========
    async function searchMusic(query, page) {
      const url = `http://search.kuwo.cn/r.s?client=kt&all=${encodeURIComponent(query)}&pn=${page - 1}&rn=30&uid=2574109560&ver=kwplayer_ar_8.5.4.2&vipver=1&ft=music&cluster=0&strategy=2012&encoding=utf8&rformat=json&vermerge=1&mobi=1`;
      const response = await fetch(getProxyUrl(url));
      let text = await response.text();
      if (text.startsWith('callback(') || text.startsWith('jsonp(')) {
        text = text.substring(text.indexOf('(') + 1, text.lastIndexOf(')'));
      }
      let res;
      try { res = JSON.parse(text); } catch(e) { res = eval('(' + text + ')'); }
      const songs = res.abslist.map(_ => ({
        id: _.MUSICRID.replace("MUSIC_", ""),
        artwork: artworkShort2Long(_.web_albumpic_short),
        title: decodeHTML(_.NAME || ""),
        artist: decodeHTML(_.ARTIST || ""),
        album: decodeHTML(_.ALBUM || ""),
      }));
      return { isEnd: (+res.PN + 1) * +res.RN >= +res.TOTAL, data: songs };
    }
    async function fetchLyrics(songId) {
      const url = `http://m.kuwo.cn/newh5/singles/songinfoandlrc?musicId=${songId}&httpStatus=1`;
      console.log('📡 请求歌词 URL:', url);
      try {
        const response = await fetch(getProxyUrl(url));
        const res = await response.json();
        const rawList = res.data?.lrclist || [];
        if (rawList.length === 0) return [];
        return rawList.map(line => {
          let time = 0;
          if (typeof line.time === 'string' && line.time.includes(':')) {
            const parts = line.time.split(':');
            time = parseInt(parts[0]) * 60 + parseFloat(parts[1]);
          } else time = parseFloat(line.time) || 0;
          return { time, text: decodeHTML(line.lineLyric || '') };
        }).filter(item => item.text);
      } catch(e) {
        console.error('❌ 加载歌词出错:', e);
        return [];
      }
    }
    async function fetchHighResArtwork(songId) {
      const url = `http://m.kuwo.cn/newh5/singles/songinfoandlrc?musicId=${songId}&httpStatus=1`;
      try {
        const res = await fetch(getProxyUrl(url)).then(r => r.json());
        const originalUrl = res.data?.songinfo?.pic;
        if (!originalUrl) return null;
        const secureUrl = originalUrl.replace(/^http:/i, "https:");
        if (secureUrl.includes("starheads/")) return secureUrl.replace(/starheads\/\d+/, "starheads/800");
        if (secureUrl.includes("albumcover/")) return secureUrl.replace(/albumcover\/\d+/, "albumcover/800");
        return secureUrl;
      } catch(e) { return null; }
    }
    // ========== 渲染 ==========
    async function triggerSearch() {
      const query = searchInput.value.trim();
      if (!query) return;
      currentQuery = query;
      currentPage = 1;
      await loadSearchList();
    }
    async function loadSearchList() {
      musicList.innerHTML = '<div class="text-center text-slate-400 py-12 text-xs">🔍 正在搜寻...</div>';
      try {
        const result = await searchMusic(currentQuery, currentPage);
        playlist = result.data;
        if (playlist.length === 0) {
          musicList.innerHTML = '<div class="text-center text-slate-500 py-12 text-xs">没有找到相关音乐 😭</div>';
          pagination.classList.add('hidden');
          return;
        }
        renderPlaylist();
        pageIndicator.innerText = `第 ${currentPage} 页`;
        pagination.classList.remove('hidden');
        prevPageBtn.disabled = currentPage === 1;
        prevPageBtn.className = currentPage === 1 ? "text-[11px] px-2.5 py-1 bg-slate-800 text-slate-600 rounded-lg cursor-not-allowed" : "text-[11px] px-2.5 py-1 bg-slate-800 text-slate-300 rounded-lg hover:bg-slate-700 transition";
      } catch(err) {
        musicList.innerHTML = `<div class="text-center text-red-400 py-8 px-4 text-xs">加载失败，请检查代理</div>`;
        console.error(err);
      }
    }
    function renderPlaylist() {
      musicList.innerHTML = playlist.map((song, idx) => {
        const isActive = currentIndex === idx;
        return `
          <div data-index="${idx}" class="flex items-center justify-between p-2.5 cursor-pointer transition ${isActive ? 'bg-brand-600/15 border-l-4 border-brand-500' : 'hover:bg-slate-800/40'}">
            <div class="flex items-center space-x-2.5 min-w-0 flex-1">
              <img src="${song.artwork || DEFAULT_COVER}" class="w-8 h-8 rounded object-cover bg-slate-800 shrink-0">
              <div class="min-w-0 flex-1">
                <p class="text-xs font-semibold truncate ${isActive ? 'text-brand-400' : 'text-slate-100'}">${song.title}</p>
                <p class="text-[10px] text-slate-400 truncate">${song.artist} - ${song.album || '未知专辑'}</p>
              </div>
            </div>
            <span class="text-[10px] text-slate-500 shrink-0 ml-2">点击播放</span>
          </div>
        `;
      }).join('');
    }
    function renderLyrics() {
      if (!lyricsContainer) return;
      if (!lyrics || lyrics.length === 0) {
        lyricsContainer.innerHTML = '<div class="text-center text-slate-600 py-4 text-xs">暂无歌词</div>';
        return;
      }
      lyricsContainer.innerHTML = lyrics.map((line, idx) => `
        <div id="lyric-line-${idx}" data-time="${line.time}" class="lyric-line py-0.5 px-1.5 text-center text-xs md:text-sm text-slate-500 font-medium transition-all duration-200 cursor-pointer hover:text-white rounded">
          ${line.text}
        </div>
      `).join('');
    }
    // ========== 播放 ==========
    async function playSong(idx) {
      if (idx < 0 || idx >= playlist.length) return;
      currentIndex = idx;
      const song = playlist[currentIndex];
      renderPlaylist();
      playerTitle.innerText = song.title;
      playerArtist.innerText = song.artist;
      playerCover.src = song.artwork || DEFAULT_COVER;
      playerCover.onerror = function() { this.src = DEFAULT_COVER; };
      const QUALITY_MAP = { '128k': 'standard', '320k': 'exhigh', 'flac': 'lossless' };
      const apiLevel = QUALITY_MAP[qualitySelect.value] || 'standard';
      const playUrl = `https://music.nxinxz.com/kw.php?id=${encodeURIComponent(song.id)}&level=${apiLevel}&type=mp3`;
      audioPlayer.src = playUrl;
      audioPlayer.play().catch(err => console.log('等待用户交互', err));
      updatePlayButtonState(true);
      fetchHighResArtwork(song.id).then(url => { if(url) { song.artwork = url; playerCover.src = url; } });
      lastActiveIdx = -1;
      miniLyricText.innerText = "⏳ 正在加载歌词...";
      lyricsContainer.innerHTML = '<div class="text-center text-slate-500 py-4 text-xs">正在加载...</div>';
      downloadLrcBtn.classList.add('hidden');
      lyrics = [];
      const rawLyrics = await fetchLyrics(song.id);
      if (rawLyrics.length > 0) {
        lyrics = rawLyrics;
        renderLyrics();
        downloadLrcBtn.classList.remove('hidden');
        miniLyricText.innerText = `🎵 ${song.title} - ${song.artist}`;
      } else {
        lyricsContainer.innerHTML = '<div class="text-center text-slate-600 py-4 text-xs">暂无歌词</div>';
        miniLyricText.innerText = "🔇 暂无歌词";
      }
    }
    function updatePlayButtonState(isPlaying) {
      if (isPlaying) {
        playIcon.innerHTML = `<path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />`;
      } else {
        playIcon.innerHTML = `<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" />`;
      }
    }
    // ========== 下载 ==========
    async function downloadCurrentSong() {
      if (currentIndex === -1) { alert('请先播放一首歌曲'); return; }
      const song = playlist[currentIndex];
      const QUALITY_MAP = { '128k': 'standard', '320k': 'exhigh', 'flac': 'lossless' };
      const apiLevel = QUALITY_MAP[qualitySelect.value] || 'standard';
      const playUrl = `https://music.nxinxz.com/kw.php?id=${encodeURIComponent(song.id)}&level=${apiLevel}&type=mp3`;
      const originalHTML = downloadSongBtn.innerHTML;
      downloadSongBtn.innerHTML = `<span class="animate-pulse">⏳</span> 下载中...`;
      downloadSongBtn.disabled = true;
      try {
        const blob = await fetch(getProxyUrl(playUrl)).then(r => r.blob());
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${song.title} - ${song.artist}.${apiLevel === 'lossless' ? 'flac' : 'mp3'}`;
        a.click();
        URL.revokeObjectURL(a.href);
      } catch(e) { alert('下载失败'); }
      downloadSongBtn.innerHTML = originalHTML;
      downloadSongBtn.disabled = false;
    }
    function downloadLyrics() {
      if (lyrics.length === 0) { alert('没有歌词可下载'); return; }
      const song = playlist[currentIndex];
      let lrc = `[ti:${song.title}]\n[ar:${song.artist}]\n[al:${song.album || '未知'}]\n`;
      lyrics.forEach(line => {
        const m = Math.floor(line.time / 60).toString().padStart(2, '0');
        const s = Math.floor(line.time % 60).toString().padStart(2, '0');
        const ms = Math.floor((line.time * 100) % 100).toString().padStart(2, '0');
        lrc += `[${m}:${s}.${ms}]${line.text}\n`;
      });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([lrc], { type: 'text/plain;charset=utf-8' }));
      a.download = `${song.title} - ${song.artist}.lrc`;
      a.click();
      URL.revokeObjectURL(a.href);
    }
    // ========== 音频事件 ==========
    audioPlayer.ontimeupdate = () => {
      const cur = audioPlayer.currentTime;
      const dur = audioPlayer.duration || 0;
      progressBar.style.width = `${(cur/dur)*100 || 0}%`;
      currentTimeEl.innerText = formatTime(cur);
      durationTimeEl.innerText = formatTime(dur);
      if (lyrics.length > 0) {
        let activeIdx = -1;
        for (let i = 0; i < lyrics.length; i++) {
          if (cur >= lyrics[i].time) activeIdx = i;
          else break;
        }
        if (activeIdx === -1) activeIdx = 0;
        if (activeIdx !== lastActiveIdx) {
          lastActiveIdx = activeIdx;
          const line = lyrics[activeIdx];
          miniLyricText.innerText = line.text ? `🎤 ${line.text}` : "🎵 ...";
          document.querySelectorAll('.lyric-line').forEach((el, idx) => {
            if (idx === activeIdx) {
              el.className = 'lyric-line py-1 px-1.5 text-center text-xs md:text-sm text-brand-400 font-extrabold transition-all duration-300 transform scale-105';
              const containerHeight = lyricsContainer.clientHeight;
              const lineTop = el.offsetTop;
              lyricsContainer.scrollTo({ top: lineTop - containerHeight / 2, behavior: 'smooth' });
            } else {
              el.className = 'lyric-line py-0.5 px-1.5 text-center text-xs md:text-sm text-slate-500 font-medium transition-all duration-200 cursor-pointer hover:text-white rounded';
            }
          });
        }
      }
    };
    audioPlayer.onended = () => {
      if (currentIndex < playlist.length - 1) playSong(currentIndex + 1);
      else playSong(0);
    };
    // ========== 事件绑定 ==========
    searchBtn.onclick = triggerSearch;
    searchInput.onkeypress = e => e.key === 'Enter' && triggerSearch();
    musicList.addEventListener('click', e => {
      const row = e.target.closest('[data-index]');
      if (row) playSong(+row.dataset.index);
    });
    prevPageBtn.onclick = async () => { if(currentPage > 1) { currentPage--; await loadSearchList(); } };
    nextPageBtn.onclick = async () => { currentPage++; await loadSearchList(); };
    playBtn.onclick = () => {
      if (!audioPlayer.src) return;
      if (audioPlayer.paused) { audioPlayer.play(); updatePlayButtonState(true); }
      else { audioPlayer.pause(); updatePlayButtonState(false); }
    };
    prevBtn.onclick = () => playlist.length && playSong(currentIndex > 0 ? currentIndex - 1 : playlist.length - 1);
    nextBtn.onclick = () => playlist.length && playSong(currentIndex < playlist.length - 1 ? currentIndex + 1 : 0);
    progressContainer.onclick = e => {
      if (!audioPlayer.duration) return;
      const rect = progressContainer.getBoundingClientRect();
      audio.currentTime = ((e.clientX - rect.left) / rect.width) * audioPlayer.duration;
    };
    lyricsContainer.onclick = e => {
      const line = e.target.closest('.lyric-line');
      if (line) audioPlayer.currentTime = parseFloat(line.dataset.time);
    };
    qualitySelect.onchange = async () => {
      if (currentIndex === -1) return;
      const t = audioPlayer.currentTime;
      await playSong(currentIndex);
      audioPlayer.currentTime = t;
    };
    downloadSongBtn.onclick = downloadCurrentSong;
    downloadLrcBtn.onclick = downloadLyrics;
    settingsBtn.onclick = () => {
      proxyInput.value = localStorage.getItem('music_cors_proxy') || 'https://seep.eu.org/';
      settingsModal.classList.remove('hidden');
    };
    closeSettingsBtn.onclick = () => settingsModal.classList.add('hidden');
    saveProxyBtn.onclick = () => {
      const val = proxyInput.value.trim();
      val ? localStorage.setItem('music_cors_proxy', val) : localStorage.removeItem('music_cors_proxy');
      settingsModal.classList.add();
      window.location.reload();
    };
    // ========== 初始化 ==========
    initTheme();
    playerCover.src = DEFAULT_COVER;
    playerCover.onerror = () => playerCover.src = DEFAULT_COVER;
    console.log('初音水蓝二次元主题加载完成');
  </script>
</body>
</html>
